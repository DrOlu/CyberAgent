name: cyberagent

services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: cyberagent
      POSTGRES_USER: ${POSTGRES_USER:-cyberagent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cyberagent}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
