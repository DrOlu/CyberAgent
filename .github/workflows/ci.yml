name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Verify reserved-slugs.ts is up to date
        # Re-runs the generator and fails on any drift from the
        # checked-in TypeScript output. The Go side embeds the JSON
        # source directly, so a passing diff here proves both sides
        # share one source of truth.
        run: |
          pnpm generate:reserved-slugs
          git diff --exit-code -- packages/core/paths/reserved-slugs.ts

      # Catch landing-i18n drift early — the same check the upstream sync
      # workflow runs before pushing. See scripts/check-landing-i18n.mjs
      # and the v1.5.0 release post-mortem (missing hero.talkToSales +
      # contactSales caused the docker-web-build to fail at release time
      # with a confusing TypeScript error). Running it in CI as well as
      # in the sync workflow defends against manual edits that bypass
      # the sync bot.
      - name: Verify landing i18n dictionaries match the LandingDict type
        run: node scripts/check-landing-i18n.mjs

      - name: Build, type check, lint, and test
        run: pnpm exec turbo build typecheck lint test --filter='!@multica/docs'

      # Post-build assertion: scan the desktop renderer bundle for
      # rolldown-emitted $N duplicate-identifier suffixes on
      # React-context-carrying libraries (react-query, zustand, etc.).
      # The dedupe whitelist in apps/desktop/electron.vite.config.ts
      # has to stay in sync with whatever the workspace currently
      # pulls in — a transitive dep update can reintroduce the dual-
      # instance hazard that crashed the v1.5.0–v1.5.2 desktop releases
      # with `Uncaught Error: No QueryClient set, use QueryClientProvider`.
      # The turbo build above must produce
      # apps/desktop/out/renderer/assets/index-*.js for this to run.
      - name: Verify desktop renderer is single-instance for React contexts
        run: node scripts/check-renderer-dedupe.mjs

  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: cyberagent
          POSTGRES_USER: cyberagent
          POSTGRES_PASSWORD: cyberagent
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cyberagent -d cyberagent"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://cyberagent:cyberagent@localhost:5432/cyberagent?sslmode=disable
      # Wires up the RedisLocalSkill*_test.go suite. Distinct from REDIS_URL
      # (which would flip the server binary itself onto the Redis-backed
      # realtime relay + request stores); the tests talk to this Redis
      # directly so they run alongside the Postgres-backed suite.
      REDIS_TEST_URL: redis://localhost:6379/1
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"
          cache-dependency-path: server/go.sum

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Test Helm chart
        run: bash scripts/helm-config.test.sh

      - name: Build
        run: cd server && go build ./...

      - name: Run migrations
        run: cd server && go run ./cmd/migrate up

      - name: Test
        run: cd server && go test ./...
