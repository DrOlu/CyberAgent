name: Notify Multica on Release
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag to notify about (e.g. v1.4.3)'
        required: false
        default: ''

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Multica autopilot
        env:
          WEBHOOK_URL: https://api.multica.ai/api/webhooks/autopilots/awt_vwg3VZuHPsgdSOSm2ZRNsvNUUBBFpm4FL03XYqVcZe0
          TAG_NAME: ${{ inputs.tag_name || github.ref_name }}
        run: |
          python3 -c "
          import json, urllib.request, os, time, urllib.error
          payload = json.dumps({
            'action': 'published',
            'release': {
              'tag_name': os.environ.get('TAG_NAME', ''),
              'draft': False,
              'prerelease': False
            },
            'repository': {
              'full_name': os.environ.get('GITHUB_REPOSITORY', ''),
              'name': os.environ.get('GITHUB_REPOSITORY', '').split('/', 1)[-1] if '/' in os.environ.get('GITHUB_REPOSITORY', '') else ''
            }
          }).encode()
          url = os.environ['WEBHOOK_URL']
          max_attempts = 5
          for attempt in range(1, max_attempts + 1):
            req = urllib.request.Request(url, data=payload, headers={'Content-Type': 'application/json'})
            try:
              urllib.request.urlopen(req, timeout=30)
              print(f'Webhook delivered (attempt {attempt})')
              break
            except urllib.error.HTTPError as e:
              if e.code in (429, 500, 502, 503, 504) and attempt < max_attempts:
                wait = min(2 ** attempt, 60)
                print(f'Attempt {attempt} got HTTP {e.code}; retrying in {wait}s')
                time.sleep(wait)
                continue
              raise
            except urllib.error.URLError as e:
              if attempt < max_attempts:
                wait = min(2 ** attempt, 60)
                print(f'Attempt {attempt} network error: {e}; retrying in {wait}s')
                time.sleep(wait)
                continue
              raise
          "
