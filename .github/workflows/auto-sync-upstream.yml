name: Sync Upstream

on:
  schedule:
    # Run every hour — upstream multica releases frequently
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Force sync even if no new upstream commits"
        type: boolean
        default: false
      create_tag:
        description: "Tag to create after sync (e.g. v1.0.1) — triggers release"
        type: string
        default: ""

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    # Only run on the canonical repo, not forks
    if: github.repository_owner == 'DrOlu'
    steps:
      - name: Checkout CyberAgent
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # PAT_TOKEN is required so the merge commit (which may include
          # workflow file changes) can be pushed back to the repo.
          # GITHUB_TOKEN cannot push .github/workflows/ files.
          token: ${{ secrets.PAT_TOKEN }}

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/multica-ai/multica.git
          git fetch upstream main --depth=1000

      - name: Check for upstream changes
        id: check
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          set -e
          FORCE="${{ github.event.inputs.force }}"
          if [ "$FORCE" = "true" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "new_upstream_release=false" >> "$GITHUB_OUTPUT"
            echo "Force sync requested."
            exit 0
          fi

          # Use the SHA recorded in the last sync commit message as the baseline.
          # The merge-base approach over-counts because CyberAgent rebrand commits
          # diverge the history, causing it to always find "new" commits.
          LAST_SYNCED_SHA=$(git log origin/main --oneline --grep="^sync: merge upstream" -1             | grep -oE "[0-9a-f]{8,40}" | tail -1 || echo "")
          UPSTREAM_HEAD=$(git rev-parse upstream/main)

          echo "Last synced upstream SHA: ${LAST_SYNCED_SHA:-none}"
          echo "Upstream HEAD:            ${UPSTREAM_HEAD}"

          if [ -z "$LAST_SYNCED_SHA" ] || [ "$UPSTREAM_HEAD" != "$LAST_SYNCED_SHA" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            NEW_COUNT=$(git rev-list --count "${LAST_SYNCED_SHA:-$(git rev-parse origin/main)}..upstream/main" 2>/dev/null || echo "?")
            echo "Found ${NEW_COUNT} new upstream commit(s) since last sync."
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No new upstream commits since last sync."
          fi

          # Check if upstream has cut a NEW RELEASE since we last tagged.
          # Only bump our version tag when upstream releases — not on every commit.
          # This prevents CyberAgent from releasing 18+ times/day for trivial commits.
          LAST_UPSTREAM_RELEASE=$(gh release list --repo multica-ai/multica --limit 1             --json tagName --jq ".[0].tagName" 2>/dev/null || echo "")

          LAST_SYNCED_RELEASE=""
          if [ -f .upstream-release ]; then
            LAST_SYNCED_RELEASE=$(cat .upstream-release)
          fi

          echo "Last upstream release:        ${LAST_UPSTREAM_RELEASE:-none}"
          echo "Last synced upstream release: ${LAST_SYNCED_RELEASE:-none}"
          echo "last_upstream_release=${LAST_UPSTREAM_RELEASE}" >> "$GITHUB_OUTPUT"

          if [ -n "$LAST_UPSTREAM_RELEASE" ] && [ "$LAST_UPSTREAM_RELEASE" != "$LAST_SYNCED_RELEASE" ]; then
            echo "new_upstream_release=true" >> "$GITHUB_OUTPUT"
            echo "New upstream release detected: $LAST_UPSTREAM_RELEASE (was: ${LAST_SYNCED_RELEASE:-none})"
          else
            echo "new_upstream_release=false" >> "$GITHUB_OUTPUT"
            echo "No new upstream release (current: ${LAST_UPSTREAM_RELEASE:-none})"
          fi

      - name: Snapshot CyberAgent-specific files
        if: steps.check.outputs.has_changes == 'true'
        run: |
          SNAP=".cyberagent-snapshot"
          rm -rf "$SNAP"
          mkdir -p "$SNAP"

          # Read the manifest of CyberAgent-owned files. These files are
          # snapshotted before merge and restored verbatim after, ensuring
          # our branding never gets overwritten by upstream. The rebrand
          # script then handles any NEW upstream files that still carry
          # "Multica" strings.
          while IFS= read -r f; do
            # Skip blank lines and comments
            [[ -z "$f" || "$f" == "#"* ]] && continue
            if [ -e "$f" ]; then
              mkdir -p "$SNAP/$(dirname "$f")"
              cp -a "$f" "$SNAP/$f"
            fi
          done < scripts/rebrand-manifest.txt

          echo "Snapshotted $(find "$SNAP" -type f | wc -l) file(s)."

      - name: Merge upstream
        if: steps.check.outputs.has_changes == 'true'
        run: |
          set -e
          git config user.name "CyberAgent Sync Bot"
          git config user.email "cyberagent-bot@hyperspace.ng"

          # Merge upstream/main. Conflicts in snapshotted files are
          # harmless because we restore our versions afterwards. Any
          # conflicts in NON-snapshotted files will fail the job and
          # require manual resolution (add them to the manifest).
          #
          # Special case: pnpm-lock.yaml is never snapshotted (it changes
          # too often) — instead we auto-resolve it with --theirs (take
          # upstream's lockfile) and then regenerate it from package.json
          # in a follow-up step. This keeps our dep graph in sync with
          # upstream without polluting the manifest.
          if ! git merge upstream/main --no-edit --no-ff 2>&1; then
            CONFLICTS=$(git diff --name-only --diff-filter=U)
            echo "Conflicts in: $CONFLICTS"

            # First pass: auto-resolve pnpm-lock.yaml with --theirs (upstream
            # wins; we'll regenerate it below from our package.json).
            if echo "$CONFLICTS" | grep -qx "pnpm-lock.yaml"; then
              echo "Auto-resolving pnpm-lock.yaml with upstream version (will regenerate)."
              git checkout --theirs pnpm-lock.yaml
              git add pnpm-lock.yaml
              # Refresh conflict list after resolving the lockfile
              CONFLICTS=$(git diff --name-only --diff-filter=U)
            fi

            # Second pass: any remaining conflicts must be in the manifest.
            # A file is covered if its exact path is listed OR if it lives
            # under a directory that is listed (prefix match). This allows
            # entire directories like apps/docs/content/docs to be snapshotted
            # without listing every file individually.
            ALL_IN_MANIFEST=true
            UNRESOLVED=""
            if [ -n "$CONFLICTS" ]; then
              while IFS= read -r cf; do
                COVERED=false
                while IFS= read -r entry; do
                  [[ -z "$entry" || "$entry" == "#"* ]] && continue
                  # Exact match OR the conflict path starts with the entry as a directory prefix
                  if [ "$cf" = "$entry" ] || [[ "$cf" == "$entry/"* ]]; then
                    COVERED=true
                    break
                  fi
                done < scripts/rebrand-manifest.txt
                if [ "$COVERED" = "false" ]; then
                  echo "::error::Unresolved conflict in non-snapshotted file: $cf"
                  ALL_IN_MANIFEST=false
                  UNRESOLVED="$UNRESOLVED $cf"
                fi
              done <<< "$CONFLICTS"
            fi

            if [ "$ALL_IN_MANIFEST" = "true" ]; then
              # All remaining conflicts are in snapshotted files — resolve with ours.
              if [ -n "$CONFLICTS" ]; then
                git checkout --ours $CONFLICTS
                git add $CONFLICTS
              fi
              git commit --no-edit
              echo "Auto-resolved conflicts using CyberAgent versions."
            else
              # Some conflicts are in non-snapshotted files. These are files that
              # are mostly upstream content but have brand strings that our rebrand
              # sed will fix in the next step. Resolve them with --theirs (take
              # upstream) so the merge can proceed, then let rebrand.sh patch the
              # brand strings. If a file truly needs our version, add it to the
              # manifest instead.
              echo "::warning::Conflicts in non-snapshotted files — resolving with upstream (--theirs)."
              echo "::warning::Unresolved files:$UNRESOLVED"
              echo "::warning::The rebrand step will fix any brand strings in these files."
              echo "::warning::If a file should always use our version, add it to scripts/rebrand-manifest.txt."
              for cf in $UNRESOLVED; do
                git checkout --theirs "$cf" 2>/dev/null || true
                git add "$cf"
              done
              # Also resolve any remaining snapshotted conflicts with ours
              if [ -n "$CONFLICTS" ]; then
                git checkout --ours $CONFLICTS
                git add $CONFLICTS
              fi
              git commit --no-edit
              echo "Auto-resolved: snapshotted files → ours, non-snapshotted → upstream."
            fi
          fi

      - name: Restore CyberAgent-specific files
        if: steps.check.outputs.has_changes == 'true'
        run: |
          ./scripts/rebrand.sh --restore

          # Clean up snapshot dir (don't commit it)
          rm -rf .cyberagent-snapshot

      - name: Apply rebrand substitutions
        if: steps.check.outputs.has_changes == 'true'
        run: |
          ./scripts/rebrand.sh --rebrand

      - name: Reconcile apps/desktop/package.json
        if: steps.check.outputs.has_changes == 'true'
        run: |
          # apps/desktop/package.json is intentionally NOT snapshotted so
          # upstream dep changes (e.g. new eslint rules requiring deps in
          # `dependencies` instead of `devDependencies`) flow through. The
          # rebrand script re-applies just the 3 brand-identity fields
          # (productName, description, homepage). Everything else — deps,
          # devDeps, scripts — is taken straight from upstream.
          ./scripts/rebrand.sh --reconcile-desktop-pkg

      - name: Set up pnpm
        if: steps.check.outputs.has_changes == 'true'
        uses: pnpm/action-setup@v4

      - name: Set up Node
        if: steps.check.outputs.has_changes == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Tidy Go modules after upstream merge
        if: steps.check.outputs.has_changes == 'true'
        run: |
          # upstream may add/remove Go deps between syncs. Running go mod tidy
          # keeps server/go.mod and server/go.sum in sync so `go test ./...`
          # doesn't fail with "updates to go.mod needed".
          cd server
          go mod tidy
          cd ..
          if ! git diff --quiet server/go.mod server/go.sum; then
            git add server/go.mod server/go.sum
            echo "go.mod / go.sum updated by go mod tidy"
          else
            echo "go.mod / go.sum already in sync"
          fi

      - name: Regenerate pnpm-lock.yaml from merged package.json
        if: steps.check.outputs.has_changes == 'true'
        run: |
          # After merge, package.json may have new dependencies from
          # upstream. Regenerate the lockfile so it matches the merged
          # manifests exactly. --lockfile-only avoids running install
          # scripts and is fast.
          pnpm install --lockfile-only
          if ! git diff --quiet pnpm-lock.yaml; then
            git add pnpm-lock.yaml
            echo "Lockfile regenerated."
          else
            echo "Lockfile already in sync."
          fi

      - name: Pre-flight — lint apps/desktop
        if: steps.check.outputs.has_changes == 'true'
        continue-on-error: false
        run: |
          # Run the desktop lint that has historically been the first
          # thing to break on upstream syncs (new eslint rules,
          # devDeps -> deps moves, new imports). Catching it here means
          # we never push a sync commit that's known-broken.
          #
          # We do a focused install for just this package's lint graph,
          # not a full repo install, to keep this fast (~30s).
          set +e
          pnpm install --frozen-lockfile --filter=@multica/desktop... 2>&1 | tail -20
          INSTALL_EXIT=$?
          if [ $INSTALL_EXIT -ne 0 ]; then
            echo "::warning::Focused install failed — falling back to full install"
            pnpm install --frozen-lockfile 2>&1 | tail -20 || true
          fi
          set -e
          pnpm --filter=@multica/desktop lint 2>&1 | tee /tmp/desktop-lint.log
          LINT_EXIT=${PIPESTATUS[0]}
          if [ $LINT_EXIT -ne 0 ]; then
            echo "::error::apps/desktop lint failed during sync pre-flight"
            echo "::error::This usually means upstream changed dependency placement (deps vs devDeps)"
            echo "::error::or introduced new imports that aren't in apps/desktop/package.json."
            echo "::error::See /tmp/desktop-lint.log above for the specific rule violations."
            exit 1
          fi
          echo "✅ apps/desktop lint passed."

      # Run a fast, zero-dep guardrail BEFORE pushing the sync commit.
      # If upstream added a new top-level field to the landing-page
      # LandingDict type (apps/web/features/landing/i18n/types.ts) that
      # did not flow into the snapshotted dictionaries (en.ts / zh.ts),
      # fail the sync here. This is what bit us in v1.5.0: hero.talkToSales
      # + the entire contactSales section landed in types.ts, but the
      # snapshot pipeline dropped them from the dictionaries, and the web
      # build only blew up at release time. Catching it during sync means
      # `main` stays green and we get a workflow failure notification
      # pointing at the missing keys.
      - name: Verify landing i18n dictionaries are in sync with the LandingDict type
        if: steps.check.outputs.has_changes == 'true'
        run: node scripts/check-landing-i18n.mjs

      - name: Commit and push
        if: steps.check.outputs.has_changes == 'true'
        run: |
          set -e
          # Stage all rebrand changes
          git add -A

          # Only commit if there are changes
          if git diff --cached --quiet; then
            echo "No rebrand changes to commit."
            exit 0
          fi

          UPSTREAM_SHA=$(git rev-parse --short upstream/main)
          # Record the upstream release we synced against
          UPSTREAM_RELEASE="${{ steps.check.outputs.last_upstream_release }}"
          if [ -n "$UPSTREAM_RELEASE" ]; then
            echo "$UPSTREAM_RELEASE" > .upstream-release
            git add .upstream-release
          fi
          git commit -m "sync: merge upstream multica-ai/multica@${UPSTREAM_SHA} + rebrand"
          git push origin main
          echo "Pushed sync commit."

      - name: Create or auto-bump release tag
        # Runs when:
        #   a) create_tag input is provided (manual override — use exact tag), OR
        #   b) has_changes is true and no create_tag was given (scheduled sync
        #      with new upstream commits) — auto-bump the patch version.
        #
        # Auto-bump logic:
        #   1. Find the latest vMAJOR.MINOR.PATCH tag on origin.
        #   2. Increment PATCH by 1.
        #   3. Tag the new sync commit and push.
        #
        # This means every scheduled sync that pulls in upstream changes
        # automatically cuts a new release without any manual input.
        if: >
          github.event.inputs.create_tag != '' ||
          steps.check.outputs.new_upstream_release == 'true'
        run: |
          set -e

          if [ -n "${{ github.event.inputs.create_tag }}" ]; then
            # Manual override — use the exact tag provided.
            TAG="${{ github.event.inputs.create_tag }}"
            echo "Using manually specified tag: $TAG"
          else
            # Auto-bump: read latest semver tag, increment patch.
            LATEST=$(git tag --list 'v*.*.*' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -1)
            if [ -z "$LATEST" ]; then
              LATEST="v1.0.0"
              echo "No existing semver tag found — starting at $LATEST"
            fi
            MAJOR=$(echo "$LATEST" | cut -d. -f1 | tr -d 'v')
            MINOR=$(echo "$LATEST" | cut -d. -f2)
            PATCH=$(echo "$LATEST" | cut -d. -f3)
            PATCH=$((PATCH + 1))
            TAG="v${MAJOR}.${MINOR}.${PATCH}"
            echo "Auto-bumped: $LATEST → $TAG"
          fi

          # Idempotency guard — skip if tag already exists.
          if git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "::warning::Tag $TAG already exists locally — skipping creation."
            exit 0
          fi
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "::warning::Tag $TAG already exists on origin — skipping creation."
            exit 0
          fi

          git tag "$TAG"
          git push origin "$TAG"
          echo "✅ Created tag $TAG — Release workflow will trigger automatically."

          # Update .upstream-release so subsequent sync runs don't re-tag.
          # This is the authoritative write — even if the commit step exited
          # early (no rebrand changes), this ensures .upstream-release on main
          # reflects the release we just tagged for.
          UPSTREAM_RELEASE="${{ steps.check.outputs.last_upstream_release }}"
          if [ -n "$UPSTREAM_RELEASE" ]; then
            git config user.name "CyberAgent Sync Bot"
            git config user.email "cyberagent-bot@hyperspace.ng"
            echo "$UPSTREAM_RELEASE" > .upstream-release
            git add .upstream-release
            if ! git diff --cached --quiet; then
              git commit -m "chore: record upstream release $UPSTREAM_RELEASE in .upstream-release"
              git push origin main
              echo "Updated .upstream-release to $UPSTREAM_RELEASE on main"
            else
              echo ".upstream-release already up to date"
            fi
          fi

      - name: Summary
        if: always()
        run: |
          echo "## Sync Upstream Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.check.outputs.has_changes }}" = "true" ]; then
            UPSTREAM_SHA=$(git rev-parse --short upstream/main 2>/dev/null || echo "N/A")
            echo "✅ Merged upstream changes (multica-ai/multica@${UPSTREAM_SHA}) and applied rebrand." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "⏭️ No new upstream commits found." >> "$GITHUB_STEP_SUMMARY"
          fi
